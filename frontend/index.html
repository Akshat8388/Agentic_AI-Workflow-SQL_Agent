<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL_Agent</title>
   <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h2 class="auth-title">SQLAgent</h2>
    <p class="auth-subtitle">Your intelligent SQL assistant</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>

    <div class="auth-form" id="loginForm">
      <input type="text" class="auth-input" id="loginUsername" placeholder="Username"/>
      <input type="password" class="auth-input" id="loginPassword" placeholder="Password"/>
      <button class="auth-btn" onclick="handleLogin()">Login</button>
      <p class="auth-error" id="loginError"></p>
    </div>

    <div class="auth-form" id="registerForm" style="display:none">
      <input type="text" class="auth-input" id="regUsername" placeholder="Username"/>
      <input type="email" class="auth-input" id="regEmail" placeholder="Email"/>
      <input type="password" class="auth-input" id="regPassword" placeholder="Password"/>
      <button class="auth-btn" onclick="handleRegister()">Register</button>
      <p class="auth-error" id="registerError"></p>
    </div>
  </div>
</div>
  <div class="app-layout">
    <div class="side-bar">
      <div class="sidebar-top-row">
        <div class="toggle-btn">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="#fff"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </div>
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebarAvatar"></div>
          <span id="usernameDisplay" class="username-display"></span>
          <button class="sidebar-logout-btn" id="logoutBtn" onclick="handleLogout()" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor">
              <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/>
            </svg>
          </button>
        </div>
      </div>
      <br>
      <div class="new-chat-btn">
        <button class="new-chat" id="newChatBtn">
  <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF">
    <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
  </svg>
  <span>New Chat</span>
</button>
      </div>
      <div class="previous-chats">
         <div class="history-label">
    <span>Recent Queries</span>
  </div>
  <div class="chat-list" id="chatList">
    </div>
      </div>
    </div>
<div class="chat-container">
    <div class="header">
      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="#fff"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
      </button>
      <h2>SQLAgent</h2>
      <div class="buttons">
        <button class="db_btn">
          <span class="db_indicator" title="Database Connection"></span>
          <p>Try Sample DB</p>
           
          <div class="tooltip">
            <h4>📊 Sample Database Info</h4>
            
            <div class="tooltip-section">
              <h5>🏢 Departments Table</h5>
              <p>10 departments across major US cities</p>
              <p style="font-size: 11px; color: #888; margin-top: 2px;">Sales, Engineering, HR, Marketing, Finance, etc.</p>
            </div>
            
            <div class="tooltip-divider"></div>
            
            <div class="tooltip-section">
              <h5>👥 Employees Table</h5>
              <p>30 employees with complete profiles</p>
              <p style="font-size: 11px; color: #888; margin-top: 2px;">Names, ages, departments, salaries</p>
            </div>
            
            <div class="tooltip-divider"></div>
            
            <div class="tooltip-section">
              <h5>💡 Try queries like:</h5>
              <p style="font-size: 11px;">• "Show all employees in Engineering"<br>• "Average salary by department etc..."</p>
            </div>
            <div class="tooltip-divider"></div>
            <div class="tooltip-section">
              <h5>⚠️ Try human approval queries like:</h5>
              <p style="font-size: 11px;">• "Delete employees with salary below 40000"<br>• "Update all Marketing salaries by 10% etc..."</p>
            </div>
          </div>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Theme Toggle">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF" id="themeIcon">
            <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/>
          </svg>
        </button>

      </div> 
    </div>

    <div class="intro" id="intro">
      <h1>How can I help you today?</h1>
      <h3><span class="element"></span></h3>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area centered-input" id="inputBox">
      <button class="content-btn" id="dbConnectBtn" title="Connect Database">
        <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="#FFFFFF">
          <path d="M480-520q150 0 255-47t105-113q0-66-105-113t-255-47q-150 0-255 47T120-680q0 66 105 113t255 47Zm0 100q41 0 102.5-8.5T701-456q57-19 98-49.5t41-74.5v100q0 44-41 74.5T701-356q-57 19-118.5 27.5T480-320q-41 0-102.5-8.5T259-356q-57-19-98-49.5T120-480v-100q0 44 41 74.5t98 49.5q57 19 118.5 27.5T480-420Zm0 200q41 0 102.5-8.5T701-256q57-19 98-49.5t41-74.5v100q0 44-41 74.5T701-156q-57 19-118.5 27.5T480-120q-41 0-102.5-8.5T259-156q-57-19-98-49.5T120-280v-100q0 44 41 74.5t98 49.5q57 19 118.5 27.5T480-220Z"/>
        </svg>
      </button>
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn">
        <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="#FFFFFF">
          <path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/>
        </svg>
      </button>
    </div>
  </div>
  </div>
  
 
  <div id="approvalModal" class="modal">
    <div class="modal-content">
      <p id="approvalMessage"></p>
      <div class="modal-buttons">
        <button id="approveYes" type="button" onclick="approval_is_yes()">Yes</button>
        <button id="approveNo" type="button" onclick="approval_is_no()">No</button>
      </div>
    </div>
  </div>

  <div id="dbModal" class="modal">
    <div class="modal-content">
      <h3>Connect to your Database</h3>
      <input type="text" id="dbUriInput" placeholder="e.g. postgresql://user:pass@host/db">
      <p id="dbConnectError" style="color:#e74c3c; font-size:12px;display:none;"></p>
      <p id="dbConnectSuccess" style="color:#32ff5e; font-size:12px;display:none;">✅ Your Database is connected!</p>
      <div class="modal-buttons">
        <button id="connectDbBtn">Connect</button>
        <button id="disconnectDbBtn" style="display:none; background:#e74c3c; color: #FFFFFF;">Disconnect</button>
        <button id="cancelDbBtn">Cancel</button>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
   <script src="scripts/chat.js"></script>
</body>
</html>
